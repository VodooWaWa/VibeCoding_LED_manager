name: Build & Release

on:
  push:
    branches: [master, main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            script: build:win
          - os: macos-latest
            target: mac
            script: build:mac
          - os: ubuntu-latest
            target: linux
            script: build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.target }}
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/Vibe-Coding-LED-Manager-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename and prepare release files
        run: |
          mkdir release-files
          for f in artifacts/**/Vibe-Coding-LED-Manager-*; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            case "$name" in *.blockmap|*-win.exe) continue ;; esac
            # Vibe-Coding-LED-Manager-1.0.0-linux-x86_64.AppImage → VibeCoding_LED_manager_linux_x86_64.AppImage
            newname="VibeCoding_LED_manager_$(echo "$name" \
              | sed -E 's/^Vibe-Coding-LED-Manager-[0-9]+\.[0-9]+\.[0-9]+-//' \
              | tr '-' '_')"
            cp "$f" "release-files/$newname"
            echo "  $name → $newname"
          done
          ls -la release-files/

      - name: Create Release
        run: |
          gh release create "v${{ github.run_number }}" release-files/* \
            --title "Build #${{ github.run_number }}" \
            --notes "Automated build from commit ${{ github.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}
