name: Build & Release

on:
  push:
    branches: [master, main]
    paths:
      - 'transport/**'
      - 'plugin/**'
      - 'hooks/**'
      - 'skill/**'
      - 'install.py'
      - 'mcp.json'
      - 'electron-ci/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            script: build:win
          - os: macos-latest
            target: mac
            script: build:mac
          - os: ubuntu-latest
            target: linux
            script: build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: electron-ci
        run: npm install

      - name: Build ${{ matrix.target }}
        working-directory: electron-ci
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: electron-ci/dist/Vibe-Coding-LED-Manager-*
