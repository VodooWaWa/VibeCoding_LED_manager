name: Build & Release

on:
  push:
    branches: [master, main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            script: build:win
          - os: macos-latest
            target: mac
            script: build:mac
          - os: ubuntu-latest
            target: linux
            script: build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.target }}
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/Vibe-Coding-LED-Manager-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename and prepare release files
        run: |
          mkdir release-files
          for f in artifacts/**/Vibe-Coding-LED-Manager-*; do
            name=$(basename "$f")
            ext="${name##*.}"
            # Transform: Vibe-Coding-LED-Manager-1.0.0-win-x64.exe → VibeCoding_LED_manager_win_x64.exe
            newname=$(echo "$name" \
              | sed -E 's/^Vibe-Coding-LED-Manager-/VibeCoding_LED_manager_/' \
              | sed -E 's/-[0-9]+\.[0-9]+\.[0-9]+-/_/' \
              | tr '-' '_')
            cp "$f" "release-files/$newname"
            echo "  $name → $newname"
          done
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
